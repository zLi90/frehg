# P19 unified-validation tier thresholds + per-benchmark run policy (Task 19.3.2).
#
# `metric` selects how the PASS/REVIEW/FAIL tier is decided:
#   well_balanced   : max|eta - eta0| < strict  => PASS (b0-lake; closed-form well-balanced)
#   legacy_l2_depth : relative L2 of surface depth vs a committed legacy reference; < strict =>
#                     PASS, < loose => REVIEW, else FAIL (b1-sw, physics matches the legacy port)
#   review_physics  : run stability + finiteness + (closable) water mass balance; the registry
#                     gates these `review`, so the BEST tier is REVIEW (never auto-PASS); FAIL on
#                     crash / non-finite state / mass residual > mass_fail. (b2-gw, b3-b6)
#
# `run`: full (use the config's own t_end/max_steps) | capped (override max_steps). `--quick`
# caps every benchmark to `quick_max_steps` for a fast CI smoke.
#
# `mass_fail` is the relative water-balance residual above which a closable (SW-only) budget FAILs.
# The SWE semi-implicit solver has a wet/dry conservation floor well below 1e-2, so 1e-2 is the
# FAIL line and 1e-10 the PASS line (REVIEW between), per the plan's mass-balance bands.

quick_max_steps: 60

benchmarks:
  b1-sw:
    metric: legacy_l2_depth
    reference: ../benchmarks/b1-sw/frehg2_np1_depth_reference.txt
    field: water_depth
    strict: 1.0e-6
    loose: 1.0e-4
    run: full
    mass_fail: 1.0e-2

  b2-gw:
    metric: review_physics
    strict: 1.0e-2
    loose: 5.0e-2
    run: capped
    max_steps: 400
    mass_fail: 1.0e-2     # GW-only: water budget not closable (flux BC uninstrumented) -> informational
    note: >
      Strict element-wise legacy parity is enforced by ctest test_re_b2_gw (the Warrick 9-point
      analytical reference is itself approximate and is NOT used as a gate; see R-2).

  b3-kirkland:
    metric: review_physics
    run: capped
    max_steps: 1500
    mass_fail: 1.0e-2
    status: full_2d_pca   # full 2-D (x-z) layered Richards via P23 3-D RE + fixed-flux top
    note: >
      Full 2-D layered Kirkland (3-D Richards + per-cell soil + fixed-flux top, PCA scheme). The
      element-wise contour match vs the digitized Kirkland h=0/h=-400 reference (RMS ~0.25-0.29 m)
      is gated by tests/integration/test_b3_kirkland.cpp; the harness only smoke-runs it capped.

  b4-govindaraju:
    metric: review_physics
    run: capped
    max_steps: 600
    mass_fail: 1.0e-2

  b5-vcatchment:
    metric: review_physics
    run: capped
    max_steps: 200
    # The initial dry-bed wetting transient on the real DEM reaches ~1.5% mass error in the first
    # ~60 steps (a documented SWE semi-implicit wet/dry artifact; it settles to ~0.4% by 200 steps).
    # The hard-FAIL bound catches gross blowups; the 1%/1e-10 informational band still reports it.
    mass_fail: 5.0e-2

  b6-kuan:
    metric: review_physics
    run: capped
    max_steps: 100
    mass_fail: 1.0e-2     # coupled: GW flux BC uninstrumented -> mass residual informational

# b0-lake is a SEPARATE check (run_b0_lake.py), NOT part of the b1-b6 suite.
b0_lake:
  metric: well_balanced
  strict: 1.0e-12     # closed-form well-balanced (machine precision)
  run: full
