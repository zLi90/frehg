schema_version: '2.0'
simulation:
  id: b1-sw
  title: Converted from legacy input (MAXP1)
  mode: surface_water
  legacy_finput: b1-input/
domain:
  nx: 1
  ny: 10
  nz: 30
  dx: 80.0
  dy: 80.0
  dz: 0.1
  dz_incre: 1.0
  botz: -3.0
  follow_terrain: true
  mpi:
    enabled: false
    nx: 1
    ny: 1
  bathymetry:
    from_file: true
  active_mask:
    from_file: false
time:
  dt: 5.0
  t_end: 18000.0
  max_steps: 100
  output_interval: 1800
  dt_checkpoint: null
  max_checkpoints: null
modules:
  surface_water: true
  groundwater: false
  solute: false
surface_water:
  gravity: 9.81
  manning: 0.019
  min_depth: 1.0e-08
  viscosity:
    x: 1.0e-06
    y: 1.0e-06
  waterfall_depth: 1.0e-08
  h_diffusion_ref: 0.1
  rho_air: 1.225
  rho_water: 998.0
  diffusive_wave: false
  bc_type_sw: &id001
  - 0
  - 0
  - 0
  - 0
  wind:
    enabled: false
    from_file: false
    data_len: 100000
    init_speed: 0.0
    init_dir: 0.0
    cw: 0.0013
    cw_t: 5.0
    north_angle: 0.0
  subgrid:
    enabled: false
    r_sub: 30
    eta_min: 0.0
    eta_max: 0.9
    deta: 0.05
groundwater:
  solver: pca
  full_3d: true
  adaptive_dt: true
  use_corrector: true
  post_allocate: false
  use_vg: true
  use_mvg: false
  air_entry_value: -0.02
  dt_max: 20.0
  dt_min: 0.01
  co_max: 2
  specific_storage: 1.0e-05
  bc_type_gw: &id004
  - 0
  - 0
  - 0
  - 0
  - 0
  - 0
coupling:
  mode: sync
  surface_dt: 5.0
  groundwater_dt: 0.01
initial_conditions:
  surface_water:
    eta: -2.0
    eta_from_file: false
    uv_from_file: false
  groundwater:
    wc: 0.5
    h: 1.0
    wt_rel: 1.0
    wt_abs: -0.75
    h_from_file: false
    wc_from_file: false
  solute:
    surface: 15.0
    subsurface: 35.0
boundary_conditions:
  surface: []
  groundwater:
  - face: x+
    legacy_code: 0
    kind: no_flux
  - face: x-
    legacy_code: 0
    kind: no_flux
  - face: y+
    legacy_code: 0
    kind: no_flux
  - face: y-
    legacy_code: 0
    kind: no_flux
  - face: z+ (bottom)
    legacy_code: 0
    kind: no_flux
  - face: z- (top)
    legacy_code: 0
    kind: no_flux
  solute: []
sources:
  surface:
    rainfall:
      from_file: true
      rate: 0.0
      data_len: 4
    evaporation:
      from_file: false
      model: 0
      rate: 0.0
      data_len: 20000
    inflow:
      count: 0
      loc_x: &id002
      - 56
      - 56
      loc_y: &id003
      - 1
      - 1
      from_file: false
      rate: 0.0
      data_len: 63
soil:
  map:
    from_file: false
  types:
  - id: 0
    theta_s: 0.4
    theta_r: 0.08
    vg:
      alpha: 1.0
      n: 2.0
    k_sat:
      x: 0.0
      y: 1.16e-07
      z: 1.16e-07
solute:
  n_species: 0
  baroclinic: false
  advection_scheme: upwind
  diffusion:
    x: 1.0e-10
    y: 1.0e-10
    z: 1.0e-10
  dispersivity:
    longitudinal: 0.1
    lateral: 0.01
  io:
    tide_file: true
    tide_datlen: 732
    inflow_file: false
    inflow_datlen: 1
    surf_file: true
    subs_file: false
monitoring:
  points:
  - i: 0
    j: 4
output:
  format: hdf5
  filename: out/b1-sw.h5
  variables:
  - water_depth
  - eta
  - uu
  - vv
  legacy_foutput: out/
validation:
  reference_type: legacy_text_snapshots
  tolerance: 1.0e-06
  variables:
  - water_depth
legacy_raw:
  sim_id: MAXP1
  finput: b1-input/
  foutput: out/
